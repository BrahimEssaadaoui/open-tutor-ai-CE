name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "ui/**"
      - ".github/workflows/ci-frontend.yaml"
  pull_request:
    branches: [main, dev]
    paths:
      - "ui/**"
      - ".github/workflows/ci-frontend.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - name: Check formatting
        run: npx prettier --check "**/*.{js,ts,svelte,css,md,html,json}"

      - name: Check i18n keys
        run: npm run i18n:parse

      - name: Verify no untracked changes
        run: git diff --exit-code

      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

  test:
    name: Vitest unit tests
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: npm ci

      - name: Build SvelteKit (required before tests)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Run tests
        run: npm run test:frontend
